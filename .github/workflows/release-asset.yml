name: release-asset

# When release-please publishes a GitHub Release, build the bundle and attach
# starlink-card.js as a release asset (HACS downloads this file).
on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Attach bundle to release
        uses: softprops/action-gh-release@v2
        with:
          files: starlink-card.js
